<h2>🚨 Report Emergency</h2>
<form name="emergency-report" method="POST" data-netlify="true">
  <input type="hidden" name="form-name" value="emergency-report" />
  <input type="text" name="location" placeholder="Location" required />
  <textarea name="description" placeholder="Describe situation" required></textarea>
  <button type="submit">Submit Report</button>
</form>
