<!DOCTYPE html>
<html>
<head>
  <title>Global Disaster Management</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <h1>🌍 Global Disaster Management</h1>
  <div id="map"></div>
  <div id="info"></div>
  <h2>🚨 Report Emergency</h2>
<form name="emergency-report" method="POST" data-netlify="true">
  <input type="hidden" name="form-name" value="emergency-report" />
  <input type="text" name="location" placeholder="Location" required />
  <textarea name="description" placeholder="Describe situation" required></textarea>
  <button type="submit">Submit Report</button>
</form>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
